<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora financiera de rentabilidad Profit Factor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #00adc0; border-radius: 10px; }
        .tooltip-box { display: none; }
        .group:hover .tooltip-box { display: block; }
        
        /* Animaciones suaves */
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        const App = () => {
            const brandColor = "#00adc0";

            // --- Estado ---
            const [currency, setCurrency] = useState('COP'); 
            const [useCustomPrice, setUseCustomPrice] = useState(false);
            const [customPriceInput, setCustomPriceInput] = useState(0);
            const [openGuide, setOpenGuide] = useState(false);
            
            const [formData, setFormData] = useState({
                salaryDesired: 15000000,
                monthlyRevenueGoal: 40000000,
                hoursPerMonth: 160,
                taxPercentage: 19,
                marginDesired: 25,
                serviceHours: 12, 
                adsPercentage: 10
            });

            // Gastos fijos típicos para profesionales independientes/asesores
            const [fixedExpenses, setFixedExpenses] = useState([
                { id: 1, name: 'Seguridad Social / Salud', amount: 1800000, active: true },
                { id: 2, name: 'Suscripciones Software (Canva, Zoom, CRM)', amount: 450000, active: true },
                { id: 3, name: 'Asistente Virtual / Freelance', amount: 1200000, active: true },
                { id: 4, name: 'Oficina / Co-working', amount: 800000, active: true },
                { id: 5, name: 'Formación y Libros', amount: 300000, active: true }
            ]);

            const [commissionTeam, setCommissionTeam] = useState([
                { id: 1, role: 'Closer de Ventas', percentage: 10, active: true }
            ]);

            const [newExpenseName, setNewExpenseName] = useState('');
            const [newExpenseAmount, setNewExpenseAmount] = useState('');
            const [newRoleName, setNewRoleName] = useState('');
            const [newRolePercentage, setNewRolePercentage] = useState('');

            // --- Handlers ---
            const addFixedExpense = () => {
                if (!newExpenseName || !newExpenseAmount) return;
                setFixedExpenses([...fixedExpenses, { 
                    id: Date.now(), 
                    name: newExpenseName, 
                    amount: parseFloat(newExpenseAmount), 
                    active: true 
                }]);
                setNewExpenseName('');
                setNewExpenseAmount('');
            };

            const updateExpenseAmount = (id, newAmount) => {
                setFixedExpenses(fixedExpenses.map(e => 
                    e.id === id ? { ...e, amount: parseFloat(newAmount) || 0 } : e
                ));
            };

            const addCommissionRole = () => {
                if (!newRoleName || !newRolePercentage) return;
                setCommissionTeam([...commissionTeam, { 
                    id: Date.now(), 
                    role: newRoleName, 
                    percentage: parseFloat(newRolePercentage), 
                    active: true 
                }]);
                setNewRoleName('');
                setNewRolePercentage('');
            };

            const handleCurrencyChange = (newCurrency) => {
                if (newCurrency === currency) return;
                const factor = newCurrency === 'USD' ? (1 / 4000) : 4000;
                setFormData(prev => ({
                    ...prev,
                    salaryDesired: prev.salaryDesired * factor,
                    monthlyRevenueGoal: prev.monthlyRevenueGoal * factor
                }));
                setFixedExpenses(prev => prev.map(e => ({ ...e, amount: e.amount * factor })));
                setCurrency(newCurrency);
            };

            const formatValue = (val) => {
                return new Intl.NumberFormat(currency === 'COP' ? 'es-CO' : 'en-US', {
                    style: 'currency',
                    currency: currency,
                    maximumFractionDigits: currency === 'USD' ? 2 : 0
                }).format(val);
            };

            // --- Cálculos ---
            const results = useMemo(() => {
                const totalFixedMonthly = fixedExpenses.reduce((acc, curr) => curr.active ? acc + curr.amount : acc, 0);
                const totalMonthlyCommitment = formData.salaryDesired + totalFixedMonthly;
                const hourlyRateFixed = totalMonthlyCommitment / formData.hoursPerMonth;
                const deliveryCost = hourlyRateFixed * formData.serviceHours;
                
                const commissionPercent = commissionTeam.reduce((acc, curr) => curr.active ? acc + curr.percentage : acc, 0);
                const adsPercent = formData.adsPercentage;
                const profitPercentGoal = formData.marginDesired;
                
                const totalVariablePercent = (commissionPercent + adsPercent + profitPercentGoal) / 100;
                const safeDivisor = totalVariablePercent >= 1 ? 0.01 : (1 - totalVariablePercent);
                const suggestedPriceBeforeTax = deliveryCost / safeDivisor;
                
                let priceBeforeTax = suggestedPriceBeforeTax;
                if (useCustomPrice && customPriceInput > 0) {
                    priceBeforeTax = currency === 'COP' 
                        ? customPriceInput / (1 + (formData.taxPercentage / 100)) 
                        : customPriceInput;
                }

                const commissionAmount = priceBeforeTax * (commissionPercent / 100);
                const adsAmount = priceBeforeTax * (formData.adsPercentage / 100);
                const taxAmount = priceBeforeTax * (formData.taxPercentage / 100);
                const finalPrice = priceBeforeTax + taxAmount;
                
                const profitAmount = priceBeforeTax - deliveryCost - commissionAmount - adsAmount;
                const realProfitPercent = priceBeforeTax > 0 ? (profitAmount / priceBeforeTax) * 100 : 0;
                const salesToGoal = priceBeforeTax > 0 ? Math.ceil(formData.monthlyRevenueGoal / priceBeforeTax) : 0;
                const capacityUtilization = (salesToGoal * formData.serviceHours) / formData.hoursPerMonth;

                const maxCAC = adsAmount;
                const runway3Months = totalMonthlyCommitment * 3;
                const breakEvenSales = Math.ceil(totalMonthlyCommitment / (priceBeforeTax - (priceBeforeTax * (commissionPercent / 100)) - (priceBeforeTax * (adsPercent / 100))));

                return {
                    totalFixedMonthly, totalMonthlyCommitment, deliveryCost, commissionAmount, adsAmount, 
                    profitAmount, priceBeforeTax, finalPrice, salesToGoal, realProfitPercent,
                    capacityUtilization, maxCAC, runway3Months, breakEvenSales, hourlyRateFixed
                };
            }, [formData, fixedExpenses, commissionTeam, currency, useCustomPrice, customPriceInput]);

            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            });

            const InfoIcon = ({ text }) => (
                <div className="relative group inline-block ml-1">
                    <i data-lucide="info" className="w-3 h-3 text-slate-400 cursor-help"></i>
                    <div className="tooltip-box absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-48 p-2 bg-slate-800 text-white text-[10px] rounded-lg shadow-xl z-50 leading-tight font-normal normal-case">
                        {text}
                        <div className="absolute top-full left-1/2 -translate-x-1/2 border-8 border-transparent border-t-slate-800"></div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#f8fafc] p-4 md:p-8 animate-fade-in font-inter">
                    {/* Header */}
                    <div className="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div className="flex-1">
                            <h1 className="text-2xl md:text-3xl font-black text-slate-900 tracking-tight uppercase italic">
                                Calculadora <span style={{ color: brandColor }}>Profit Factor</span>
                            </h1>
                            <p className="text-slate-500 font-medium text-xs mt-1 italic uppercase tracking-wider">Para profesionales que quieren un negocio, no un autoempleo agotador.</p>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <button 
                                onClick={() => setOpenGuide(!openGuide)} 
                                className="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-slate-600 transition-colors py-2 px-3 rounded-lg border border-slate-200 bg-white"
                            >
                                <i data-lucide="help-circle" className="w-4 h-4"></i>
                                {openGuide ? "Cerrar Guía" : "Cómo funciona"}
                            </button>
                            <div className="flex bg-white p-1 rounded-xl border border-slate-200 shadow-sm">
                                <button onClick={() => handleCurrencyChange('COP')} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold ${currency === 'COP' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-400'}`}>COP</button>
                                <button onClick={() => handleCurrencyChange('USD')} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold ${currency === 'USD' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-400'}`}>USD</button>
                            </div>
                        </div>
                    </div>

                    {/* Guía */}
                    {openGuide && (
                        <div className="max-w-6xl mx-auto mb-8 bg-white p-6 rounded-3xl border border-slate-200 shadow-xl grid grid-cols-1 md:grid-cols-4 gap-6 animate-fade-in">
                            <div className="space-y-2">
                                <h4 className="font-black text-[#00adc0] uppercase text-[10px]">01. El Sueldo</h4>
                                <p className="text-[11px] text-slate-600 leading-relaxed">Tu pago no es "lo que sobre". Es un costo fijo que el negocio debe cubrir obligatoriamente.</p>
                            </div>
                            <div className="space-y-2">
                                <h4 className="font-black text-[#00adc0] uppercase text-[10px]">02. Tu Hora</h4>
                                <p className="text-[11px] text-slate-600 leading-relaxed">Calculamos el costo de tu tiempo operativo para saber cuánto cuesta realmente entregar tu servicio.</p>
                            </div>
                            <div className="space-y-2">
                                <h4 className="font-black text-[#00adc0] uppercase text-[10px]">03. El Equipo</h4>
                                <p className="text-[11px] text-slate-600 leading-relaxed">Vendedores y setters se pagan con el margen del producto, nunca de tu bolsillo personal.</p>
                            </div>
                            <div className="space-y-2">
                                <h4 className="font-black text-[#00adc0] uppercase text-[10px]">04. El Margen</h4>
                                <p className="text-[11px] text-slate-600 leading-relaxed">Ese 25-30% es lo que permite que el negocio crezca, se reinvierta y sea predecible.</p>
                            </div>
                        </div>
                    )}

                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
                        {/* Inputs */}
                        <div className="space-y-6">
                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                <h2 className="text-xs font-black uppercase text-slate-400 tracking-widest mb-6 flex items-center">
                                    <i data-lucide="target" className="w-4 mr-2" style={{color: brandColor}}></i> Metas de Negocio
                                </h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 uppercase flex items-center">Sueldo Deseado <InfoIcon text="Monto fijo que quieres retirarte cada mes." /></label>
                                        <input type="number" value={formData.salaryDesired} onChange={(e) => setFormData({...formData, salaryDesired: parseFloat(e.target.value) || 0})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl border-none font-bold outline-[#00adc0]" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 uppercase flex items-center">Facturación Meta <InfoIcon text="Objetivo de ventas mensuales totales." /></label>
                                        <input type="number" value={formData.monthlyRevenueGoal} onChange={(e) => setFormData({...formData, monthlyRevenueGoal: parseFloat(e.target.value) || 0})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl border-none font-bold outline-[#00adc0]" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 uppercase flex items-center">Margen Utilidad Deseado (%) <InfoIcon text="Ganancia pura para reinversión." /></label>
                                        <input type="number" value={formData.marginDesired} onChange={(e) => setFormData({...formData, marginDesired: parseFloat(e.target.value) || 0})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl border-none font-bold outline-[#00adc0]" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-500 uppercase flex items-center">Horas Mensuales <InfoIcon text="Horas totales de trabajo." /></label>
                                            <input type="number" value={formData.hoursPerMonth} onChange={(e) => setFormData({...formData, hoursPerMonth: parseFloat(e.target.value) || 0})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl border-none font-bold outline-[#00adc0]" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-500 uppercase flex items-center">Horas p/ Cliente <InfoIcon text="Tiempo de entrega." /></label>
                                            <input type="number" value={formData.serviceHours} onChange={(e) => setFormData({...formData, serviceHours: parseFloat(e.target.value) || 0})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl border-none font-bold outline-[#00adc0]" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                <h2 className="text-xs font-black uppercase text-slate-400 tracking-widest mb-6 flex items-center">
                                    <i data-lucide="layout" className="w-4 mr-2" style={{color: brandColor}}></i> Gastos Fijos
                                </h2>
                                <div className="space-y-3 mb-6 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
                                    {fixedExpenses.map(exp => (
                                        <div key={exp.id} className="p-3 bg-slate-50 rounded-xl group transition-all">
                                            <div className="flex items-center justify-between mb-2">
                                                <div className="flex items-center gap-2">
                                                    <input type="checkbox" checked={exp.active} onChange={() => setFixedExpenses(fixedExpenses.map(e => e.id === exp.id ? {...e, active: !e.active} : e))} className="w-4 h-4 accent-[#00adc0]" />
                                                    <span className="text-[11px] font-black text-slate-600 uppercase italic">{exp.name}</span>
                                                </div>
                                                <button onClick={() => setFixedExpenses(fixedExpenses.filter(e => e.id !== exp.id))} className="text-rose-400 opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="x" className="w-3"></i></button>
                                            </div>
                                            <div className="relative">
                                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400">{currency === 'COP' ? '$' : 'USD'}</span>
                                                <input 
                                                    type="number" 
                                                    value={exp.amount} 
                                                    onChange={(e) => updateExpenseAmount(exp.id, e.target.value)} 
                                                    className="w-full pl-8 p-1.5 text-xs bg-white border border-slate-200 rounded-lg font-bold outline-[#00adc0]" 
                                                />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="space-y-2 pt-4 border-t border-slate-100">
                                    <input type="text" placeholder="Otro gasto (Ej: Contador)" value={newExpenseName} onChange={(e) => setNewExpenseName(e.target.value)} className="w-full p-2 text-xs bg-slate-50 rounded-lg outline-[#00adc0]" />
                                    <div className="flex gap-2">
                                        <input type="number" placeholder="Monto" value={newExpenseAmount} onChange={(e) => setNewExpenseAmount(e.target.value)} className="w-full p-2 text-xs bg-slate-50 rounded-lg outline-[#00adc0]" />
                                        <button onClick={addFixedExpense} className="bg-slate-900 text-white px-4 rounded-lg text-xs font-bold">+</button>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                <h2 className="text-xs font-black uppercase text-slate-400 tracking-widest mb-6 flex items-center">
                                    <i data-lucide="users" className="w-4 mr-2" style={{color: brandColor}}></i> Costos Variables
                                </h2>
                                <div className="space-y-2 mb-4">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 uppercase flex items-center mb-1">Inversión Ads (%) <InfoIcon text="% destinado a pauta (Facebook/Google Ads)." /></label>
                                        <input type="number" value={formData.adsPercentage} onChange={(e) => setFormData({...formData, adsPercentage: parseFloat(e.target.value) || 0})} className="w-full p-2 text-xs bg-slate-50 rounded-lg outline-[#00adc0] font-bold" />
                                    </div>
                                </div>
                                <div className="space-y-2 mb-6">
                                    {commissionTeam.map(member => (
                                        <div key={member.id} className="flex items-center justify-between p-3 bg-slate-900 text-white rounded-xl">
                                            <span className="text-[10px] font-bold uppercase">{member.role}</span>
                                            <div className="flex items-center gap-3">
                                                <span className="text-xs font-black text-[#00adc0]">{member.percentage}%</span>
                                                <button onClick={() => setCommissionTeam(commissionTeam.filter(m => m.id !== member.id))} className="text-rose-400"><i data-lucide="trash-2" className="w-3"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="space-y-2 pt-4 border-t border-slate-100">
                                    <input type="text" placeholder="Rol (Ej: Closer)" value={newRoleName} onChange={(e) => setNewRoleName(e.target.value)} className="w-full p-2 text-xs bg-slate-50 rounded-lg outline-[#00adc0]" />
                                    <div className="flex gap-2">
                                        <input type="number" placeholder="%" value={newRolePercentage} onChange={(e) => setNewRolePercentage(e.target.value)} className="w-full p-2 text-xs bg-slate-50 rounded-lg outline-[#00adc0]" />
                                        <button onClick={addCommissionRole} className="bg-slate-900 text-white px-4 rounded-lg text-xs font-bold">+</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Resultados */}
                        <div className="lg:col-span-2 space-y-6">
                            <div className={`p-8 md:p-12 rounded-[3rem] text-white shadow-2xl border-b-[10px] transition-all duration-500 ${useCustomPrice ? 'bg-slate-800 border-amber-500' : 'bg-slate-900 border-[#00adc0]'}`}>
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <p className="text-[10px] font-black uppercase tracking-[0.3em] text-[#00adc0]">Precio Sugerido para Rentabilidad</p>
                                        <h2 className="text-5xl md:text-7xl font-black tracking-tighter mt-2 italic">{formatValue(results.finalPrice)}</h2>
                                    </div>
                                    <button onClick={() => { setUseCustomPrice(!useCustomPrice); setCustomPriceInput(results.finalPrice); }} className={`px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all ${useCustomPrice ? 'bg-amber-500 text-white shadow-lg' : 'bg-white/10 text-white/50 hover:bg-white/20'}`}>
                                        {useCustomPrice ? 'Modo: Validación' : 'Validar mi precio'}
                                    </button>
                                </div>

                                {useCustomPrice && (
                                    <div className="mb-8 bg-white/5 p-4 rounded-2xl border border-white/10 animate-fade-in">
                                        <label className="text-[9px] font-bold text-amber-400 uppercase italic">¿Cuánto cobras actualmente por este servicio?</label>
                                        <input type="number" value={customPriceInput} onChange={(e) => setCustomPriceInput(parseFloat(e.target.value) || 0)} className="w-full bg-transparent text-2xl font-black outline-none border-b border-amber-500/30 py-2" />
                                    </div>
                                )}

                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6 pt-8 border-t border-white/10">
                                    <div><p className="text-[9px] font-bold text-slate-500 uppercase mb-1">Costo Operativo</p><p className="text-sm font-bold">{formatValue(results.deliveryCost)}</p></div>
                                    <div><p className="text-[9px] font-bold text-slate-500 uppercase mb-1">Comisiones</p><p className="text-sm font-bold text-rose-400">{formatValue(results.commissionAmount)}</p></div>
                                    <div><p className="text-[9px] font-bold text-slate-500 uppercase mb-1">Inversión Ads</p><p className="text-sm font-bold text-blue-400">{formatValue(results.adsAmount)}</p></div>
                                    <div><p className="text-[9px] font-bold text-slate-500 uppercase mb-1">Margen Neto</p><p className={`text-sm font-black ${results.profitAmount > 0 ? 'text-emerald-400' : 'text-rose-400'}`}>{formatValue(results.profitAmount)}</p></div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                    <h3 className="text-sm font-black uppercase tracking-widest mb-6 italic">Salud del Negocio</h3>
                                    <div className="flex items-center gap-4 mb-4">
                                        <div className={`p-4 rounded-2xl text-white ${results.realProfitPercent < 15 ? 'bg-rose-500' : results.realProfitPercent < formData.marginDesired ? 'bg-amber-500' : 'bg-emerald-500'}`}>
                                            <i data-lucide="heart-pulse"></i>
                                        </div>
                                        <div>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase">Utilidad Real</p>
                                            <p className="text-3xl font-black">{results.realProfitPercent.toFixed(1)}%</p>
                                        </div>
                                    </div>
                                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                        <div className={`h-full transition-all duration-1000 ${results.realProfitPercent < 15 ? 'bg-rose-500' : results.realProfitPercent < formData.marginDesired ? 'bg-amber-500' : 'bg-emerald-500'}`} style={{ width: `${Math.min(Math.max(results.realProfitPercent, 0), 100)}%` }}></div>
                                    </div>
                                    
                                    <div className="mt-6 pt-6 border-t border-slate-100 grid grid-cols-2 gap-4">
                                        <div>
                                            <p className="text-[9px] font-bold text-slate-400 uppercase">Punto de Equilibrio</p>
                                            <p className="text-lg font-black">{results.breakEvenSales} ventas/mes</p>
                                        </div>
                                        <div>
                                            <p className="text-[9px] font-bold text-slate-400 uppercase">Fondo de Paz (3m)</p>
                                            <p className="text-lg font-black italic">{formatValue(results.runway3Months)}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-xl">
                                    <h3 className="text-sm font-black uppercase tracking-widest mb-6 text-[#00adc0] italic">Capacidad y CAC</h3>
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/10">
                                            <span className="text-[10px] font-bold uppercase text-slate-400 flex items-center">Valor de tu Hora <InfoIcon text="Lo que te cuesta cada hora operativa para cubrir tu sueldo y gastos fijos." /></span>
                                            <span className="text-xl font-black text-amber-400 italic">{formatValue(results.hourlyRateFixed)}</span>
                                        </div>
                                        <div className="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/10">
                                            <span className="text-[10px] font-bold uppercase text-slate-400 flex items-center">Máx x Cliente (CAC) <InfoIcon text="Es el Costo de Adquisición de Cliente máximo permitido. Es decir, cuánto puedes 'gastar' en publicidad para conseguir un cliente sin tocar tu sueldo ni tu margen de ganancia." /></span>
                                            <span className="text-xl font-black text-blue-400 italic">{formatValue(results.maxCAC)}</span>
                                        </div>
                                        <div className="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/10">
                                            <span className="text-[10px] font-bold uppercase text-slate-400">Ventas para Meta</span>
                                            <span className="text-xl font-black italic">{results.salesToGoal} Clientes</span>
                                        </div>
                                        <div className="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/10">
                                            <span className="text-[10px] font-bold uppercase text-slate-400">Ocupación Agenda</span>
                                            <span className={`text-xl font-black italic ${results.capacityUtilization > 1 ? 'text-rose-400' : 'text-emerald-400'}`}>
                                                {(results.capacityUtilization * 100).toFixed(0)}%
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Recomendaciones */}
                    <div className="max-w-6xl mx-auto bg-white p-8 md:p-12 rounded-[3rem] border border-slate-200 shadow-xl space-y-8 mb-12">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-100 pb-6">
                            <div>
                                <h3 className="text-2xl font-black text-slate-900 flex items-center gap-2 italic">
                                    <i data-lucide="zap" style={{color: brandColor}}></i> Análisis de Rentabilidad y Recomendaciones
                                </h3>
                                <p className="text-slate-500 text-sm mt-1 uppercase font-bold tracking-tight">Hoja de ruta personalizada según tus números.</p>
                            </div>
                            <div className="bg-slate-50 px-4 py-2 rounded-2xl">
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Nivel de Riesgo</span>
                                <span className={`text-xs font-black uppercase ${results.realProfitPercent < 10 || results.capacityUtilization > 1.1 ? 'text-rose-500' : results.realProfitPercent < formData.marginDesired ? 'text-amber-500' : 'text-emerald-500'}`}>
                                    {results.realProfitPercent < 10 || results.capacityUtilization > 1.1 ? 'Crítico - Acción Inmediata' : results.realProfitPercent < formData.marginDesired ? 'Alerta - Ajustes Necesarios' : 'Saludable - Escalamiento'}
                                </span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div className="space-y-4 p-6 bg-slate-50 rounded-[2rem] border border-slate-100">
                                <div className="bg-white w-10 h-10 rounded-xl flex items-center justify-center shadow-sm">
                                    <i data-lucide="dollar-sign" className="text-slate-900 w-5"></i>
                                </div>
                                <h4 className="text-xs font-black uppercase tracking-wider italic">Estrategia de Precios</h4>
                                <p className="text-xs text-slate-600 leading-relaxed font-medium">
                                    {results.realProfitPercent < 15 
                                        ? "Tu precio actual está matando tu flujo de caja. Necesitas subir precios al menos un 30% o reducir drásticamente el tiempo de entrega."
                                        : results.realProfitPercent < formData.marginDesired
                                        ? "Estás en la 'zona de estancamiento'. Cubres costos pero no generas reserva. Un ajuste del 10-15% te daría el aire necesario."
                                        : "Tus precios son coherentes. Tienes un margen saludable que permite reinvertir sin quebrar."}
                                </p>
                            </div>

                            <div className="space-y-4 p-6 bg-slate-50 rounded-[2rem] border border-slate-100">
                                <div className="bg-white w-10 h-10 rounded-xl flex items-center justify-center shadow-sm">
                                    <i data-lucide="clock-3" className="text-slate-900 w-5"></i>
                                </div>
                                <h4 className="text-xs font-black uppercase tracking-wider italic">Eficiencia Operativa</h4>
                                <p className="text-xs text-slate-600 leading-relaxed font-medium">
                                    {results.capacityUtilization > 1 
                                        ? "Eres rehén de tu negocio. Necesitas estandarizar procesos o contratar ayuda operativa urgente para cumplir tus metas."
                                        : results.capacityUtilization > 0.8
                                        ? "Estás al borde del agotamiento. Considera subir precios para atender a menos clientes con más rentabilidad."
                                        : "Tienes capacidad holgada. Enfócate en el sistema de ventas para llenar tu agenda con este margen."}
                                </p>
                            </div>

                            <div className="space-y-4 p-6 bg-slate-50 rounded-[2rem] border border-slate-100">
                                <div className="bg-white w-10 h-10 rounded-xl flex items-center justify-center shadow-sm">
                                    <i data-lucide="shield-check" className="text-slate-900 w-5"></i>
                                </div>
                                <h4 className="text-xs font-black uppercase tracking-wider italic">Seguridad y Pauta</h4>
                                <p className="text-xs text-slate-600 leading-relaxed font-medium">
                                    {results.maxCAC < (results.priceBeforeTax * 0.05)
                                        ? "Tu margen para adquirir clientes es muy bajo. Necesitas un ticket más alto para escalar con publicidad de forma segura."
                                        : `Puedes invertir hasta ${formatValue(results.maxCAC)} para conseguir un cliente y seguir siendo rentable.`}
                                </p>
                            </div>
                        </div>

                        <div className="bg-slate-900 text-white p-6 rounded-3xl border-l-4 border-[#00adc0]">
                            <p className="text-xs font-medium italic opacity-80 leading-relaxed">
                                "La libertad no se compra con facturación, se compra con margen. Si estos números te asustan, úsalos para tomar las decisiones que tu negocio necesita hoy."
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
